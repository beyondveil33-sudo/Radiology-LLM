<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>arXiv Radiology Notebook</title>
    <style>
        :root {
            --arxiv-red: #b31b1b;
            --arxiv-bg: #f9f9f9;
            --arxiv-border: #cccccc;
            --text-main: #000000;
            --text-muted: #555555;
            --font-serif: "Times New Roman", Times, serif;
            --font-sans: Arial, Helvetica, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--font-serif); background-color: var(--arxiv-bg); color: var(--text-main); height: 100vh; overflow: hidden; }

        header { background-color: #ffffff; border-bottom: 2px solid var(--arxiv-red); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; height: 60px; }
        .logo { font-size: 18px; font-weight: bold; color: var(--arxiv-red); }
        .logo span { display: none; } /* Hide subtext on mobile */

        .app-container { display: flex; flex-direction: column; height: calc(100vh - 60px); }

        /* Responsive Layout: Stacked on mobile, side-by-side on desktop */
        @media (min-width: 768px) {
            .app-container { flex-direction: row; }
            .logo span { display: inline; font-size: 14px; color: var(--text-muted); padding-left: 10px; }
        }

        .sidebar-left { width: 100%; height: 200px; background-color: #ffffff; border-bottom: 1px solid var(--arxiv-border); display: flex; flex-direction: column; }
        @media (min-width: 768px) { .sidebar-left { width: 280px; height: 100%; border-bottom: none; border-right: 1px solid var(--arxiv-border); } }

        .sidebar-header { padding: 12px; border-bottom: 1px solid var(--arxiv-border); background-color: #f1f1f1; font-weight: bold; font-size: 14px; display: flex; justify-content: space-between; align-items: center; }
        .upload-btn { background-color: var(--arxiv-red); color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 14px; }
        
        .file-list { list-style: none; overflow-y: auto; flex: 1; }
        .file-item { padding: 12px; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; }
        
        .center-viewer { flex: 1; background-color: #e4e4e4; display: flex; flex-direction: column; padding: 10px; overflow: hidden; }
        .viewer-container { background-color: #ffffff; flex: 1; border: 1px solid var(--arxiv-border); display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        
        .sidebar-right { width: 100%; flex: 1; background-color: #ffffff; border-top: 1px solid var(--arxiv-border); display: flex; flex-direction: column; }
        @media (min-width: 768px) { .sidebar-right { width: 350px; border-top: none; border-left: 1px solid var(--arxiv-border); } }
        
        .chat-history { flex: 1; padding: 10px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; font-size: 14px; }
        .message { max-width: 90%; padding: 10px; border-radius: 8px; }
        .chat-input-area { padding: 10px; border-top: 1px solid var(--arxiv-border); display: flex; gap: 5px; }
        textarea { flex: 1; height: 45px; padding: 8px; border: 1px solid var(--arxiv-border); border-radius: 4px; }
        .send-btn { background-color: var(--arxiv-red); color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div class="logo">arXiv.rad <span>Radiology Expert</span></div>
    </header>

    <div class="app-container">
        <aside class="sidebar-left">
            <div class="sidebar-header">
                <span>Documents</span>
                <input type="file" id="fileUpload" multiple accept=".pdf, image/*" style="display: none;">
                <button class="upload-btn" onclick="document.getElementById('fileUpload').click()">Upload</button>
            </div>
            <ul class="file-list" id="fileList"></ul>
        </aside>

        <main class="center-viewer">
            <div class="viewer-container" id="viewerContainer">
                <div id="viewPlaceholder">Select a document</div>
                <canvas id="canvas" style="display:none;"></canvas>
            </div>
        </main>

        <aside class="sidebar-right">
            <div class="chat-history" id="chatHistory">
                <div class="message">Select a document to begin.</div>
            </div>
            <div class="chat-input-area">
                <textarea id="chatInput" placeholder="Message..."></textarea>
                <button class="send-btn" id="sendBtn">Send</button>
            </div>
        </aside>
    </div>

    <script>
        let uploadedFiles = [];
        let activeFileId = null;

        const fileUpload = document.getElementById('fileUpload');
        const canvas = document.getElementById('canvas');
        const viewerContainer = document.getElementById('viewerContainer');
        const chatHistory = document.getElementById('chatHistory');
        const chatInput = document.getElementById('chatInput');

        fileUpload.onchange = (e) => {
            Array.from(e.target.files).forEach(file => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    uploadedFiles.push({ id: Date.now(), name: file.name, type: file.type, dataUrl: ev.target.result });
                    renderFileList();
                };
                reader.readAsDataURL(file);
            });
        };

        function renderFileList() {
            const list = document.getElementById('fileList');
            list.innerHTML = uploadedFiles.map(f => `
                <li class="file-item" onclick="selectFile(${f.id})">
                    ${f.name}
                </li>`).join('');
        }

        function selectFile(id) {
            activeFileId = id;
            const file = uploadedFiles.find(f => f.id === id);
            viewerContainer.innerHTML = '';
            if (file.type.startsWith('image/')) {
                const img = new Image();
                img.onload = () => {
                    canvas.width = img.width;
                    canvas.height = img.height;
                    canvas.style.display = 'block';
                    canvas.getContext('2d').drawImage(img, 0, 0);
                    viewerContainer.appendChild(canvas);
                };
                img.src = file.dataUrl;
            } else {
                viewerContainer.innerHTML = `<embed src="${file.dataUrl}" style="width:100%;height:100%">`;
            }
        }

        document.getElementById('sendBtn').onclick = () => {
            if (!chatInput.value.trim()) return;
            chatHistory.innerHTML += `<div class="message" style="background:#e3f2fd;align-self:flex-end">${chatInput.value}</div>`;
            chatInput.value = '';
        };
    </script>
</body>
</html>
